name: Backend CI

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths: ["backend/**"] 
  pull_request:
    types: [opened, synchronize, reopened]
    branches: ["main"]
    paths: ["backend/**"]

defaults:
  run:
    working-directory: ./backend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup JDK 25
        uses: actions/setup-java@v4
        with:
          java-version: "25"
          distribution: "temurin"
          cache: "maven" 
          
      - name: Cache SonarCloud packages
        uses: actions/cache@v4
        with:
          path: ~/.sonar/cache
          key: ${{ runner.os }}-sonar
          restore-keys: ${{ runner.os }}-sonar

      - name: Iniciar Base de Dados
        run: docker compose up -d

      - name: Aguardar Base de Dados
        run: sleep 10
  
      - name: Dar permissão de execução para o Maven Wrapper
        run: chmod +x mvnw

      - name: Build, Testes e Sonar Analysis
        continue-on-error: true
        working-directory: ./backend
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        run: mvn -B verify org.sonarsource.scanner.maven:sonar-maven-plugin:5.5.0.6356:sonar -Dsonar.projectKey=GestaoDeEventosAcademicosECulturais_geac -Dspring.profiles.active=test -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
      
      - name: Validar Relatório de Cobertura
        run: test -f target/site/jacoco/jacoco.xml
